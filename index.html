<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Stasher — Air-gapped hardware cryptocurrency wallet. Your keys never touch the internet. From personal cold storage to institutional custody." />
    <meta name="theme-color" content="#050508" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stasher — Your Keys. Your Crypto. Offline." />
    <meta property="og:description" content="Air-gapped hardware cryptocurrency wallet. Your keys never touch the internet. From personal cold storage to institutional custody." />
    <meta property="og:image" content="https://crypto-stasher.github.io/Stasher-Website/favicon.svg" />
    <meta property="og:url" content="https://crypto-stasher.github.io/Stasher-Website/" />
    <meta property="og:site_name" content="Stasher" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Stasher — Your Keys. Your Crypto. Offline." />
    <meta name="twitter:description" content="Air-gapped hardware cryptocurrency wallet. Your keys never touch the internet." />
    <meta name="twitter:image" content="https://crypto-stasher.github.io/Stasher-Website/favicon.svg" />
    <title>Stasher — Your Keys. Your Crypto. Offline.</title>
    <link rel="canonical" href="https://crypto-stasher.github.io/Stasher-Website/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Stasher",
      "url": "https://crypto-stasher.github.io/Stasher-Website/",
      "logo": "https://crypto-stasher.github.io/Stasher-Website/favicon.svg",
      "sameAs": ["https://github.com/Crypto-Stasher"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Stasher Hardware Wallet",
      "description": "Air-gapped hardware cryptocurrency wallet. Your keys never touch the internet.",
      "brand": { "@type": "Brand", "name": "Stasher" },
      "category": "Hardware Wallet",
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/PreOrder",
        "priceCurrency": "USD"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Why do I need a hardware wallet?",
          "acceptedAnswer": { "@type": "Answer", "text": "Software wallets store your private keys on internet-connected devices, making them vulnerable. A hardware wallet keeps your keys on a dedicated offline device." }
        },
        {
          "@type": "Question",
          "name": "What happens if I lose my Stasher device?",
          "acceptedAnswer": { "@type": "Answer", "text": "Your funds are safe. During setup, Stasher generates a standard 24-word BIP39 recovery seed. You can restore your wallet on a new device or any BIP39-compatible wallet." }
        },
        {
          "@type": "Question",
          "name": "How is Stasher different from Ledger or Trezor?",
          "acceptedAnswer": { "@type": "Answer", "text": "Stasher uses a true air-gap architecture with a separate cold wallet and warm wallet. The device that holds your keys has zero connectivity." }
        },
        {
          "@type": "Question",
          "name": "Is the firmware open source?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. The cold wallet firmware and communication protocol are published on GitHub. You can audit the code yourself and build from source." }
        }
      ]
    }
    </script>
  </body>
</html>
