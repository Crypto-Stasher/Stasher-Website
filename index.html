<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="preload" as="image" href="/screens/stasher-firmware-progress.png" />
    <link rel="preload" as="image" href="/screens/stasher-home.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Self-custody hardware wallet for Bitcoin, Ethereum, Solana and thousands of coins and tokens. Certified secure element, air-gapped, quantum-resilient — your keys stay offline." />
    <meta name="theme-color" content="#050606" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        let theme = 'dark';
        try {
          const saved = localStorage.getItem('theme');
          theme = saved === 'light' || saved === 'dark'
            ? saved
            : matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        } catch {
          theme = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
        document.querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', theme === 'light' ? '#f1efe7' : '#050606');
      })();
    </script>
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Stasher — Your Crypto, Truly Yours." />
    <meta property="og:description" content="Self-custody hardware wallet for Bitcoin, Ethereum, Solana and thousands of coins and tokens. Certified secure element, air-gapped, quantum-resilient — your keys stay offline." />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Stasher",
      "url": "https://stasherwallet.com/",
      "logo": "https://stasherwallet.com/favicon.svg",
      "sameAs": ["https://github.com/Crypto-Stasher"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Product",
      "name": "Stasher Hardware Wallet",
      "description": "Air-gapped hardware cryptocurrency wallet. Your keys never touch the internet.",
      "brand": { "@type": "Brand", "name": "Stasher" },
      "category": "Hardware Wallet",
      "offers": {
        "@type": "Offer",
        "availability": "https://schema.org/PreOrder",
        "priceCurrency": "USD"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Why do I need a hardware wallet?",
          "acceptedAnswer": { "@type": "Answer", "text": "Software wallets store your private keys on internet-connected devices, making them vulnerable. A hardware wallet keeps your keys on a dedicated offline device." }
        },
        {
          "@type": "Question",
          "name": "What happens if I lose my Stasher device?",
          "acceptedAnswer": { "@type": "Answer", "text": "Your funds are safe. During setup, Stasher generates a standard 24-word recovery phrase. You can restore your wallet on a new Stasher or any compatible wallet." }
        },
        {
          "@type": "Question",
          "name": "How is Stasher different from Ledger or Trezor?",
          "acceptedAnswer": { "@type": "Answer", "text": "Stasher uses a true air-gap architecture with a separate cold wallet and warm wallet. The device that holds your keys has zero connectivity." }
        },
        {
          "@type": "Question",
          "name": "How does Stasher protect my keys?",
          "acceptedAnswer": { "@type": "Answer", "text": "Your keys are held in a certified secure element rated JIL High, on a device that never touches the internet. Pairing and firmware verification use post-quantum cryptography, and the hardware is being independently audited ahead of launch." }
        }
      ]
    }
    </script>
  </body>
