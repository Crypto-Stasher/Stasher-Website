# Tracked copy of the live prod nginx server block.
# On the box: /etc/nginx/sites-available/stasher  (symlinked into sites-enabled).
# TLS lines are managed by Certbot. `root` points at the release symlink, so a
# deploy.sh symlink swap changes the live content with no nginx reload.
#
# Keep this file in sync with prod by hand (or have Jenkins assert it matches).

server {
    server_name stasherwallet.com www.stasherwallet.com;

    root /var/www/stasher/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/stasherwallet.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/stasherwallet.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.stasherwallet.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = stasherwallet.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name stasherwallet.com www.stasherwallet.com;
    return 404; # managed by Certbot
}

